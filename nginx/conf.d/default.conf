server {
    listen 80;
    server_name _;

    # Cloudflare always talks to the origin over 443; this just catches
    # any stray plain-HTTP request (e.g. direct IP hits) and upgrades it.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/certs/cloudflare-origin.key;

    root /usr/share/nginx/html;

    # Backend still mounts routes at root (e.g. /auth/google) as of this
    # writing; strip /api/v1 here so the edge contract is future-proof
    # without waiting on that backend migration. Once routes move under
    # /api/v1 in the app itself, drop the trailing slash on proxy_pass
    # (or add a matching /api/v1 prefix there) to stop stripping.
    location /api/v1/ {
        proxy_pass http://app:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
